<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Exercise | Skelora Institute Logistics Simulator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2A4A">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a class="back-link" href="skelora-institute-dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
    Document Library
  </a>
  <div class="tb-title">
    <span class="t1" id="tbTitle1">Loading…</span>
    <span class="t2" id="tbTitle2"></span>
  </div>
  <div class="tb-spacer"></div>
  <div class="tb-pill" id="progressPill">Step 1</div>
  <div class="tb-pill timer" id="timerPill">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 16,14"/></svg>
    <span id="timerDisplay">00:00</span>
  </div>
</header>

<div class="banner">
  <div class="banner-left">
    <div class="banner-eyebrow" id="bannerEyebrow"></div>
    <h1 id="bannerTitle"></h1>
    <p id="bannerDesc"></p>
  </div>
  <ul class="banner-objectives" id="bannerObjectives"></ul>
</div>

<div class="wrap">
  <nav class="tracker" id="tracker"></nav>
  <section class="content">
    <div class="step-head">
      <div class="step-eyebrow" id="stepEyebrow">Step 1</div>
      <h2 id="stepTitle">Loading…</h2>
      <div class="sub" id="stepSub"></div>
    </div>
    <div class="step-body" id="stepBody"></div>
    <div class="step-footer">
      <button class="nav-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        Back
      </button>
      <button class="nav-btn primary" id="nextBtn">
        Save &amp; Continue
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,6 15,12 9,18"/></svg>
      </button>
    </div>
  </section>
</div>

<div class="toast" id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;font-size:13px;padding:11px 18px;border-radius:9px;box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:all .22s ease;z-index:120;"></div>

<script src="auth.js"></script>
<script src="documents-data.js"></script>
<script src="engine.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
