name = "prism-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Environments ──────────────────────────────────────────────────────────────
[env.development]
name = "prism-api-dev"
vars = { ENVIRONMENT = "development" }

[env.staging]
name = "prism-api-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "prism-api"
vars = { ENVIRONMENT = "production" }

# ── R2 Bucket Bindings ────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "PRISM_FILES"
bucket_name = "prism-files-dev"
preview_bucket_name = "prism-files-dev"

[[env.production.r2_buckets]]
binding = "PRISM_FILES"
bucket_name = "prism-files-prod"

# ── KV Namespace Bindings ─────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "PRISM_KV"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_ID"

# ── Cron Triggers (file purge every day at 2am UTC) ───────────────────────────
[triggers]
crons = ["0 2 * * *"]

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───────────────────────
# These are NOT stored in this file — they're stored in Cloudflare's secret store
# Required secrets:
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY
#   FIREBASE_PROJECT_ID
#   FIREBASE_SERVICE_ACCOUNT_JSON

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
command = "npm run build"

# ── Limits ───────────────────────────────────────────────────────────────────
[limits]
cpu_ms = 30000  # 30 second CPU limit (paid plan required for >10ms)
