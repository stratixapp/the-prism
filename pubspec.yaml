name: the_prism
description: The Prism — Multi-Agent Deep Research Engine by Stratix
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ──────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Firebase ────────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_messaging: ^15.0.4
  firebase_remote_config: ^5.0.4

  # ── HTTP & API ──────────────────────────────────────────────────────
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # ── File Handling ───────────────────────────────────────────────────
  file_picker: ^8.0.6
  path_provider: ^2.1.3
  mime: ^1.0.5
  path: ^1.9.0

  # ── Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # ── UI & Animations ─────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1

  # ── Auth UI ─────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── PDF Export ──────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

  # ── TTS (Voice Readout — Phase 21) ──────────────────────────────────
  flutter_tts: ^4.0.2

  # ── Utilities ───────────────────────────────────────────────────────
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0
  uuid: ^4.4.2
  timeago: ^3.7.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.1

  # ── In-App Purchase ─────────────────────────────────────────────────
  in_app_purchase: ^3.2.0

  # ── SSE Streaming ───────────────────────────────────────────────────
  http: ^1.2.2
  eventsource: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
